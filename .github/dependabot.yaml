# Keep the SHA-pinned reusable workflows (bitwise-media-group/github-workflows) in
# this repo's callers fresh. These are CI plumbing, not the library itself, so they
# ship as `ci` — a release-please-ignored type — and never cut a Makefile-library
# release. Our own actions ship straight through with no cooldown wait.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    commit-message:
      prefix: ci
      include: scope
    cooldown:
      default-days: 7
      exclude:
        - bitwise-media-group/*
    groups:
      bitwise-media-group:
        patterns:
          - bitwise-media-group/*
      actions:
        patterns:
          - actions/*
# No npm ecosystem: prettier + markdownlint-cli2 are mise pins (mise.toml), kept
# fresh by the update-tools workflow with the same 7-day cooldown.
