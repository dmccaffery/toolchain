# The make library dogfoods its own markdown-lib archetype. This thin caller runs
# the reusable CI, which executes the canonical `make lint` / `build` / `test`
# gates — here that is addlicense + prettier + markdownlint + actionlint, with
# build/test as no-ops. The pinned tooling (addlicense, actionlint) installs via
# mise from the repo-root mise.toml/mise.lock; the reusable workflow's Setup mise
# step puts a pinned mise on PATH.
#
# Pinned to a full commit SHA (tag in the comment); Dependabot keeps it fresh.
name: Continuous Integration

on:
  push:
    branches: [main]
  pull_request:
    branches: ["main", "releases/*"]

# the reusable workflow's jobs only need contents:read; grant just that ceiling
permissions:
  contents: read

jobs:
  ci:
    uses: bitwise-media-group/github-workflows/.github/workflows/ci.yaml@a28e6738bc4f912322f9e66e9e90e7de789c4ad3 # v4.3.1
    with:
      # nothing to unit-test here (build/test are no-ops), so skip the Codecov upload
      coverage: false
