#
# The fleet's shared mise config: pinned developer CLIs, knob defaults, and the
# universal tasks every archetype uses. Consumer repos mount this library as a
# git submodule at `.mise/`, so mise loads this file natively as
# `.mise/config.toml` — no per-repo tool setup, no symlinks. The consumer's own
# root mise.toml layers on top (higher precedence): it picks an archetype via
# `[task_config] includes = [".mise/tasks/<archetype>.toml"]`, overrides [vars],
# and adds repo-local tasks.
#
# IMPORTANT: this file must never contain [task_config] — its include paths
# would resolve against each consumer's repo root and break. Archetype selection
# always lives in the consumer's root mise.toml (this repo's own root mise.toml
# dogfoods the same way).
#
# Backends are spelled out explicitly (aqua:/github:/go:) so the trust path
# for each tool is pinned and cannot drift with registry default changes. Every
# tool but govulncheck is a prebuilt release binary: sha256 checksums are locked
# per platform in mise.lock and verified on every install, plus cosign/SLSA/
# GitHub-attestation verification where the publisher provides it (all on by
# default).
#
# govulncheck publishes no binaries, so it compiles via `go install` (Go module
# proxy + checksum database) using the Go toolchain pinned below — mise installs
# that toolchain itself (checksum-verified core backend), so nothing here needs a
# system Go. It stays in the library, not just CI, so `mise run lint` and the CI
# gate stay in parity.
#
# prettier and markdownlint-cli2 are npm packages with no standalone binaries, so
# they install from the npm registry (npm: backend) using the Node runtime pinned
# below — again provisioned by mise, so repos need no package.json just to lint
# prose. Top-level versions are exact; unlike a package-lock.json, transitive npm
# dependencies are not pinned (prettier has none; markdownlint-cli2's tree is
# small). mise forwards minimum_release_age into transitive resolution (npm >=
# 11.10 --min-release-age), so even transitives can't pull a release younger than
# the cooldown. npm.package_manager is pinned to npm because the "auto" default
# silently prefers aube wherever it happens to be installed — same resolution on
# every machine matters more than install speed for two packages.
#
# grype and kubescape pull external data at runtime rather than at install:
# grype fetches its vulnerability database on first use (~200 MB, cached in
# ~/.cache/grype) and kubescape its controls artifacts (~/.kubescape), so the
# first container/deploy lint on a machine needs network. hadolint, helm and
# shellcheck are plain release binaries (helm ships via get.helm.sh rather
# than GitHub releases), checksum-locked like everything else.
#
# dotty and evolve — our own first-party CLIs — are deliberately NOT in
# [tools]: developers install and rely on local copies, and a mise pin
# shadowing them on every activated PATH was a recurring source of version
# skew. They are task-scoped instead (a `tools` map on just the tasks that
# need them, installed into the task environment without ever touching the
# activated PATH): the terraform archetype carries dotty for its
# tf-run.sh wrapper, and the agent-plugins archetype carries evolve for
# its eval suite (evolve only ever runs in a plugin/marketplace repo, so no
# other archetype pays for it).
# Both float on "latest" via {{vars.dotty_version}} / {{vars.evolve_version}}
# — a fully trusted first-party supply chain, so no cooldown, no lockfile
# pinning, no bump PRs. Two consequences of task-scoping: they are invisible
# to mise.lock and `mise upgrade --bump`, and mise resolves "latest" to the
# newest *installed* version once one exists — a machine keeps what it first
# installed until `mise install github:bitwise-media-group/dotty@latest` (same
# for evolve) refreshes it; fresh machines and CI runners always resolve the
# true latest. A consumer that needs determinism can override the version vars
# in its root mise.toml [vars] with an exact pin.
#
# Updates: the daily update-tools workflow runs `mise upgrade --bump`, which
# honours minimum_release_age below — a release must be at least 7 days old
# before it is adopted (Dependabot-style cooldown), giving the ecosystem time to
# flag a malicious or broken release. Bumps land as a human-reviewed PR; they
# cover [tools] only, since the task-scoped dotty/evolve float on "latest"
# outside the lockfile. Never run `mise lock` or `mise upgrade` in a consumer
# repo: the lockfile lives in this library, and consumer-side writes would land
# inside the submodule.

[settings]
lockfile = true
locked = false
minimum_release_age = "7d"
# dotty and evolve are task-scoped on "latest" (see above): fresh resolution
# of latest honours the cooldown, and our own same-day releases must install
# immediately, so the exclusion outlives the tools' departure from [tools].
minimum_release_age_excludes = [
  "github:bitwise-media-group/dotty",
  "github:bitwise-media-group/evolve"
]
npm.package_manager = "npm"

[tools]
go = "1.26.5"
node = "26.5.0"
python = "3.14.6"
"aqua:anchore/grype" = "0.115.0"
"aqua:anchore/syft" = "1.46.0"
"aqua:golangci/golangci-lint" = "2.12.2"
"aqua:goreleaser/goreleaser" = "2.17.0"
"aqua:gotestyourself/gotestsum" = "1.13.0"
"aqua:hadolint/hadolint" = "2.14.0"
"aqua:hashicorp/terraform" = "1.15.8"
"aqua:helm/helm" = "4.2.3"
"aqua:koalaman/shellcheck" = "0.11.0"
"aqua:kubescape/kubescape" = "4.0.10"
"aqua:rhysd/actionlint" = "1.7.12"
"aqua:sigstore/cosign" = "3.1.1"
"aqua:terraform-docs/terraform-docs" = "0.24.0"
"aqua:terraform-linters/tflint" = "0.63.1"
"github:google/addlicense" = "1.2.0"
"go:golang.org/x/vuln/cmd/govulncheck" = "1.6.0"
"npm:markdownlint-cli2" = "0.23.0"
"npm:prettier" = "3.9.5"
"aqua:astral-sh/uv" = "0.11.28"

# Structural per-repo knobs, referenced as {{vars.name}} in the task files.
# Consumers override them in their root mise.toml [vars] (higher precedence).
# Per-invocation values (VERSION, FUZZ, FUZZTIME, NPM_CI_FLAGS, ...) are plain
# environment variables read inside the task scripts instead.
[vars]
# Canonical copyright holder for the whole ecosystem. Do not vary the spelling
# per repo — a single value here is the point. Override only if a repo genuinely
# needs a different holder.
license_holder = "BitWise Media Group Ltd"
# go-cli: output binary (empty = repo directory name) and main package.
app = ""
app_pkg = "."
# go-cli: extra build tags (e.g. an embedded UI: build_tags = "withui").
build_tags = ""
# go-cli: package declaring Version/Commit/BuildDate (empty = <module>/internal/version).
version_pkg = ""
# terraform: which binary the terraform archetype drives — set to "tofu" in
# an OpenTofu repo (and add the opentofu pin to that repo's root [tools]; the
# shared [tools] only pins terraform). Secrets/env injection is not a knob:
# hack/tf-run.sh always wraps the state-touching tasks and engages dotty only
# when the module directory carries a .env.dotty.
terraform_binary = "terraform"
# First-party CLI versions for the task-scoped tools (see the header).
# "latest" resolves through the github: backend at first install on a machine;
# override in a consumer's [vars] to pin an exact version for that repo.
dotty_version = "latest"
evolve_version = "latest"
# container/deploy lint: minimum severity that fails the gate — grype
# --fail-on for Dockerfile base images, kubescape --severity-threshold for
# helm charts and kustomize directories. low|medium|high|critical.
grype_fail_on = "high"
kubescape_severity = "high"

# Universal tasks shared by every archetype. Each runs in the invoker's
# directory ({{cwd}}), matching where make recipes used to run. Helper tasks
# that only exist to be wired into aggregates are hidden, mirroring the old
# "no ## comment" convention.

# Run an agent-prepared commit batch if one is waiting. The `pr` gate calls this
# last so a green local run flows straight into the (user-signed) commit.
[tasks.commit]
description = "run ./commit.sh (agent-prepared commit batch) if present"
dir = "{{cwd}}"
run = "if [ -x ./commit.sh ]; then ./commit.sh; fi"

# House default ignores (generated/vendored trees, incl. the .mise/ submodule,
# and the agent-prepared commit.sh handoff every repo may transiently carry)
# plus one -ignore flag per non-empty line in the repo's .licenseignore
# (patterns never contain whitespace, so the word-split is safe; set -f keeps
# the shell from glob-expanding them). A repo with no .licenseignore simply
# gets the defaults.
[tasks.license]
description = "inject SPDX license headers (addlicense)"
dir = "{{cwd}}"
run = """
set -euf
ignores="-ignore node_modules/** -ignore .mise/** -ignore .claude/** -ignore .venv/** -ignore coverage/** -ignore commit.sh"
if [ -f .licenseignore ]; then
  for pattern in $(cat .licenseignore); do ignores="$ignores -ignore $pattern"; done
fi
addlicense -l mit -c '{{vars.license_holder}}' -s=only $ignores .
"""

# Check-mode counterpart wired into the `lint` aggregates.
[tasks.license-check]
hide = true
dir = "{{cwd}}"
run = """
set -euf
ignores="-ignore node_modules/** -ignore .mise/** -ignore .claude/** -ignore .venv/** -ignore coverage/** -ignore commit.sh"
if [ -f .licenseignore ]; then
  for pattern in $(cat .licenseignore); do ignores="$ignores -ignore $pattern"; done
fi
addlicense -l mit -c '{{vars.license_holder}}' -s=only $ignores -check .
"""

# Prose format/lint via the pinned prettier + markdownlint-cli2, wired into
# every archetype: all *.md, excluding generated/vendored content. The house
# defaults are this library's own .prettierrc.yaml / .prettierignore /
# .markdownlint-cli2.yaml (read from .mise/ in a consumer); a repo that carries
# its own copy of a file overrides that file wholesale. Runs from the repo root
# (config_root) so the whole repo is covered no matter where make is invoked
# (e.g. a terraform environment subdirectory). Patterns in the house ignore
# files are deliberately unanchored — prettier and markdownlint resolve them
# against the invoking repo, not against .mise/.
[tasks.fmt-prose]
hide = true
dir = "{{config_root}}"
run = """
set -eu
pcfg=".prettierrc.yaml";        [ -f "$pcfg" ] || pcfg=".mise/.prettierrc.yaml"
pign=".prettierignore";         [ -f "$pign" ] || pign=".mise/.prettierignore"
mcfg=".markdownlint-cli2.yaml"; [ -f "$mcfg" ] || mcfg=".mise/.markdownlint-cli2.yaml"
prettier --config "$pcfg" --ignore-path .gitignore --ignore-path "$pign" --no-error-on-unmatched-pattern --write "**/*.md"
markdownlint-cli2 --config "$mcfg" --fix
"""

[tasks.lint-prose]
hide = true
dir = "{{config_root}}"
run = """
set -eu
pcfg=".prettierrc.yaml";        [ -f "$pcfg" ] || pcfg=".mise/.prettierrc.yaml"
pign=".prettierignore";         [ -f "$pign" ] || pign=".mise/.prettierignore"
mcfg=".markdownlint-cli2.yaml"; [ -f "$mcfg" ] || mcfg=".mise/.markdownlint-cli2.yaml"
markdownlint-cli2 --config "$mcfg"
prettier --config "$pcfg" --ignore-path .gitignore --ignore-path "$pign" --no-error-on-unmatched-pattern --check "**/*.md"
"""

# Lint the repo's GitHub Actions workflows (no-op where there are none).
[tasks.actionlint]
description = "lint .github/workflows with actionlint"
dir = "{{cwd}}"
run = "actionlint"

# Container/deploy/shell lint, runtime-detected: each helper script probes
# for its marker files from the repo root and no-ops silently when the repo
# has none, so every archetype carries these unconditionally. Items found
# but not checkable (a kustomize Component, an unresolvable ${ARG} base
# image) are skipped with a one-line message, never silently. The logic
# lives in hack/ (shellcheck-linted, including by itself) rather than
# inline; .mise/hack/ resolves via the same submodule/symlink inversion as
# config.toml itself.

[tasks.lint-docker]
hide = true
dir = "{{config_root}}"
run = 'GRYPE_FAIL_ON="{{vars.grype_fail_on}}" ./.mise/hack/lint-docker.sh'

[tasks.lint-helm]
hide = true
dir = "{{config_root}}"
run = 'KUBESCAPE_SEVERITY="{{vars.kubescape_severity}}" ./.mise/hack/lint-helm.sh'

[tasks.lint-kustomize]
hide = true
dir = "{{config_root}}"
run = 'KUBESCAPE_SEVERITY="{{vars.kubescape_severity}}" ./.mise/hack/lint-kustomize.sh'

[tasks.lint-shell]
hide = true
dir = "{{config_root}}"
run = "./.mise/hack/lint-shell.sh"

# The composite every archetype's `lint` carries.
[tasks.lint-containers]
hide = true
run = [
  { task = "lint-docker" },
  { task = "lint-helm" },
  { task = "lint-kustomize" }
]
