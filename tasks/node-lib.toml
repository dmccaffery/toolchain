#
# node-lib — archetype for a Node/TypeScript library (design-system,
# evolve-design-system): a tsup/tsc build and a type-check, plus the house
# prose format/lint that every archetype carries.
#
# No test stub: the reusable CI workflow discovers which canonical tasks a
# repo defines (mise tasks ls --name-only) and only runs those; a library that
# grows unit tests defines `test` in its root mise.toml [tasks].

# --ignore-scripts is the safe default for a library. The ${VAR-default} form
# is unset-only, so NPM_CI_FLAGS= (empty) can still force a plain npm ci.
[node-install]
hide = true
dir = "{{cwd}}"
sources = ["package.json", "package-lock.json"]
outputs = ["node_modules/.package-lock.json"]
run = "npm ci ${NPM_CI_FLAGS---ignore-scripts --no-fund}"

# `npm run typecheck` → tsc --noEmit.
[lib-lint]
hide = true
dir = "{{cwd}}"
depends = ["node-install"]
run = "npm run typecheck"

[lib-build]
hide = true
dir = "{{cwd}}"
depends = ["node-install"]
run = "npm run build"

[fmt]
description = "format prose (prettier + markdownlint)"
run = [{ task = "fmt-prose" }]

[lint]
description = "type-check the library (tsc --noEmit) + prose lint"
run = [{ task = "lib-lint" }, { task = "lint-prose" }]

[build]
description = "build the library bundle (tsup)"
run = [{ task = "lib-build" }]

[ci]
description = "the gates the reusable CI workflow runs"
run = [{ task = "lint" }, { task = "build" }]

[pr]
description = "full local gate before a pull request"
run = [{ task = "fmt" }, { task = "lint" }, { task = "build" }, { task = "commit" }]
