#
# go-cli — archetype for a Go CLI application (dotty, evolve, gh-claude).
#
# Structural knobs come from [vars] in the consumer's root mise.toml (app,
# app_pkg, build_tags, version_pkg); per-invocation values (VERSION, COMMIT,
# DATE, LDFLAGS, MODULE, FUZZ, FUZZTIME, FUZZ_PKG) are environment variables
# with defaults computed inside the scripts — `make build VERSION=x` still
# works because make exports command-line variables to recipe subshells, and
# the go knobs also accept env (`make build APP=x`) for muscle-memory parity.
#
# `docs` is intentionally left to the repo — regenerating a CLI reference is
# app-specific (`./<app> docs …`). A repo defines a `docs` task in its root
# mise.toml [tasks] and appends it to the gate (`pr: docs` in its Makefile, or
# a redefined `pr` task). `serve`, `docs-build`, and `sync` come ready-made.
# No `e2e` here: the reusable CI's e2e job is opt-in and no Go repo opts in; a
# repo that does defines its own e2e task.

[tidy]
description = "tidy the go module graph"
dir = "{{cwd}}"
run = ["rm -f go.sum", "go mod tidy"]

# Auto-fix pass wired into the `fmt` aggregate.
[go-fmt]
hide = true
dir = "{{cwd}}"
run = ["go fmt ./...", "golangci-lint run --fix"]

# Check-mode pass wired into the `lint` aggregate. govulncheck stays here (not
# only in CI) so the local lint gate and the CI gate check the same things.
[go-lint]
hide = true
dir = "{{cwd}}"
run = ["golangci-lint run", "govulncheck ./..."]

# -covermode=atomic is the race-safe counter mode -race requires. gotestsum runs
# the suite and writes a JUnit report in one pass (propagating the exit code a
# bare `go test | …` pipe would swallow). Codecov ingests the native Go profile
# directly; coverage/ is where the reusable CI workflow uploads from.
[go-test]
hide = true
dir = "{{cwd}}"
run = """
set -eu
mkdir -p coverage
gotestsum --junitfile coverage/junit.xml -- \
  -race -covermode=atomic -coverprofile=coverage/coverage.out ./...
"""

# Version metadata stamped into the binary via -ldflags. GoReleaser injects the
# same vars at the same import path on tagged releases.
[go-build]
hide = true
dir = "{{cwd}}"
run = """
set -eu
app="${APP:-{{vars.app}}}"; app="${app:-$(basename "$PWD")}"
app_pkg="${APP_PKG:-{{vars.app_pkg}}}"
module="${MODULE:-$(go list -m 2>/dev/null || true)}"
version="${VERSION:-$(git describe --tags --always --dirty 2>/dev/null || echo dev)}"
commit="${COMMIT:-$(git rev-parse --short HEAD 2>/dev/null || echo none)}"
date="${DATE:-$(date -u +%Y-%m-%dT%H:%M:%SZ)}"
version_pkg="${VERSION_PKG:-{{vars.version_pkg}}}"; version_pkg="${version_pkg:-$module/internal/version}"
build_tags="${BUILD_TAGS:-{{vars.build_tags}}}"
ldflags="${LDFLAGS:--s -w \
  -X $version_pkg.Version=$version \
  -X $version_pkg.Commit=$commit \
  -X $version_pkg.BuildDate=$date}"
CGO_ENABLED=0 go build -trimpath ${build_tags:+-tags "$build_tags"} -ldflags "$ldflags" -o "$app" "$app_pkg"
"""

# --skip=sign: cosign keyless signing needs the GitHub Actions OIDC token, so it
# only works in the release workflow — locally it would fail or prompt.
# GoReleaser shells out to syft for SBOMs; syft is on PATH via the pins.
[snapshot]
description = "build a local release snapshot (binaries + archives, no publish or signing)"
dir = "{{cwd}}"
run = "goreleaser release --snapshot --clean --skip=sign"

[release]
description = "build and publish a release (needs a vX.Y.Z tag + creds)"
dir = "{{cwd}}"
run = "goreleaser release --clean"

# `go test -fuzz` accepts a single package only, so FUZZ_PKG must name one.
[fuzz]
description = "fuzz one target (FUZZ=FuzzName FUZZTIME=20s FUZZ_PKG=./pkg)"
dir = "{{cwd}}"
run = """
set -eu
go test -run '^$' -fuzz "^${FUZZ:-.}$" -fuzztime "${FUZZTIME:-20s}" "${FUZZ_PKG:-./...}"
"""

# Zensical documentation site (Python via uv). `uv` provisions Python +
# zensical from pyproject.toml on first use; the built site/ is git-ignored.
[sync]
hide = true
dir = "{{cwd}}"
run = "uv run sync"

[docs-build]
description = "build the documentation site (zensical)"
dir = "{{cwd}}"
depends = ["sync"]
run = "uv run zensical build"

[serve]
description = "serve the docs site locally (zensical)"
dir = "{{cwd}}"
depends = ["sync"]
run = "uv run zensical serve"

# Canonical contract: sequential composites preserve the old serial-make
# ordering (fmt before lint; mutating passes never race).
[fmt]
description = "format go + prose, inject license headers"
run = [{ task = "go-fmt" }, { task = "fmt-prose" }, { task = "license" }]

[lint]
description = "all check-mode static analysis"
run = [{ task = "license-check" }, { task = "go-lint" }, { task = "lint-prose" }]

[build]
description = "build the application binary"
run = [{ task = "go-build" }]

[test]
description = "run the unit tests with coverage"
run = [{ task = "go-test" }]

[ci]
description = "the gates the reusable CI workflow runs"
run = [{ task = "lint" }, { task = "test" }, { task = "build" }]

[pr]
description = "full local gate before a pull request"
run = [
  { task = "tidy" },
  { task = "fmt" },
  { task = "lint" },
  { task = "test" },
  { task = "build" },
  { task = "commit" },
]
