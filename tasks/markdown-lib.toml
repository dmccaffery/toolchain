#
# markdown-lib — archetype for a Markdown/YAML library with nothing to compile
# or test (github-workflows, skills, .github).
#
# Included task files use the simplified format: top-level keys ARE task names.
# The universal tasks (license*, *-prose, commit, actionlint) come from the
# library config; the aggregates here wire them into the canonical contract.
# Aggregates are sequential composites — the mutating fmt passes must not race.
#
# There are no build/test/e2e stubs: the reusable CI workflow discovers which
# canonical tasks a repo defines (mise tasks ls --name-only) and only runs
# those.

[fmt]
description = "format prose, inject license headers"
run = [{ task = "fmt-prose" }, { task = "license" }]

[lint]
description = "prose lint (prettier + markdownlint) + license check"
run = [{ task = "license-check" }, { task = "lint-prose" }]

[ci]
description = "the gates the reusable CI workflow runs"
run = [{ task = "lint" }]

[pr]
description = "full local gate before a pull request"
run = [{ task = "fmt" }, { task = "lint" }, { task = "commit" }]
