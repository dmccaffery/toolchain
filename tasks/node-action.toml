# node-action — archetype for a Node/TypeScript GitHub Action (ff-merge,
# setup-evolve): biome for lint+format, tsc for types, rollup bundles the
# committed dist/, vitest for tests. npm scripts are named check / check:fix /
# typecheck / build / test:coverage by ecosystem convention.
#
# Action repos run lifecycle scripts on install, so `npm ci` runs WITHOUT
# --ignore-scripts by default here; NPM_CI_FLAGS in the environment overrides.
# No `e2e`: running the action for real would mutate refs; covered by unit
# tests. The house prose format/lint runs alongside biome — biome owns the
# code, prettier + markdownlint own the markdown.

# Install the repo's Node dependencies exactly as locked in package-lock.json,
# and run them straight from node_modules (never npx or a global). sources/
# outputs replace the old touch-sentinel: the install is skipped while the
# lockfile copy npm leaves in node_modules is newer than the manifests.
[node-install]
hide = true
dir = "{{cwd}}"
sources = ["package.json", "package-lock.json"]
outputs = ["node_modules/.package-lock.json"]
run = "npm ci ${NPM_CI_FLAGS-}"

# Auto-fix pass wired into `fmt`.
[action-fmt]
hide = true
dir = "{{cwd}}"
depends = ["node-install"]
run = ["npm run check:fix", "npm run format"]

# Check-mode static analysis wired into `lint`: biome (lint + format check,
# incl. markdownlint) then the TypeScript type-check.
[action-lint]
hide = true
dir = "{{cwd}}"
depends = ["node-install"]
run = ["npm run check", "npm run typecheck"]

# Bundle the action into dist/ with rollup. The reusable CI fails the PR if the
# committed dist/ then differs from source, so this must be reproducible.
[action-build]
hide = true
dir = "{{cwd}}"
depends = ["node-install"]
run = "npm run build"

# vitest with coverage — emits coverage/cobertura-coverage.xml + coverage/junit.xml.
[action-test]
hide = true
dir = "{{cwd}}"
depends = ["node-install"]
run = "npm run test:coverage"

[fmt]
description = "biome --write + prose format (prettier + markdownlint)"
run = [{ task = "action-fmt" }, { task = "fmt-prose" }]

[lint]
description = "biome check + tsc --noEmit + prose lint"
run = [{ task = "action-lint" }, { task = "lint-prose" }]

[build]
description = "bundle the action into dist/ (rollup)"
run = [{ task = "action-build" }]

[test]
description = "vitest with coverage"
run = [{ task = "action-test" }]

[ci]
description = "the gates the reusable CI workflow runs"
run = [{ task = "lint" }, { task = "build" }, { task = "test" }]

[pr]
description = "full local gate before a pull request"
run = [
  { task = "fmt" },
  { task = "lint" },
  { task = "build" },
  { task = "test" },
  { task = "commit" },
]
