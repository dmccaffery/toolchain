# docs-site — archetype for a Zensical documentation site
# (bitwise-media-group.github.io, podcast-workflow).
#
# `build` renders the site. No test stub: the reusable CI workflow discovers
# which canonical tasks a repo defines (mise tasks ls --name-only) and only
# runs those — a docs site has no unit tests.

# Zensical documentation site (Python via uv). `uv` provisions Python +
# zensical from pyproject.toml on first use; the built site/ is git-ignored.
[sync]
hide = true
dir = "{{cwd}}"
run = "uv run sync"

[docs-build]
description = "build the documentation site (zensical)"
dir = "{{cwd}}"
depends = ["sync"]
run = "uv run zensical build"

[serve]
description = "serve the docs site locally (zensical)"
dir = "{{cwd}}"
depends = ["sync"]
run = "uv run zensical serve"

[fmt]
description = "format prose, inject license headers"
run = [{ task = "fmt-prose" }, { task = "license" }]

[lint]
description = "prose lint (prettier + markdownlint) + license check"
run = [{ task = "license-check" }, { task = "lint-prose" }]

[build]
description = "render the documentation site (zensical)"
run = [{ task = "docs-build" }]

[ci]
description = "the gates the reusable CI workflow runs"
run = [{ task = "lint" }, { task = "build" }]

[pr]
description = "full local gate before a pull request"
run = [{ task = "fmt" }, { task = "lint" }, { task = "build" }, { task = "commit" }]
