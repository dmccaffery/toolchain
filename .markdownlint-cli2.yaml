# House default for the whole fleet (read as .mise/.markdownlint-cli2.yaml in a
# consumer unless the repo carries its own .markdownlint-cli2.yaml). Globs and
# ignores resolve against the invoking repo, not against .mise/.
# yaml-language-server: $schema=https://raw.githubusercontent.com/DavidAnson/markdownlint-cli2/refs/heads/main/schema/markdownlint-cli2-config-schema.json
config:
  default: true
  # keep prose readable in terminals and diffs; tables are exempt.
  line-length:
    line_length: 120
    tables: false
  no-duplicate-heading:
    siblings_only: true
  code-block-style:
    style: fenced

globs:
  - "**/*.md"

ignores:
  # node cruft
  - "node_modules/**"
  # the make library submodule (its prose is linted in its own repo)
  - ".mise/**"
  # uv-managed virtualenvs (site-packages ship their own markdown)
  - ".venv/**"
  # agent cruft
  - ".claude/**"
  # machine-written by release-please, not house prose
  - "CHANGELOG.md"
