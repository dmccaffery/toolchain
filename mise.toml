#
# This repo dogfoods its own markdown-lib archetype, with the layout INVERTED
# relative to consumers: in a consumer, config.toml is the submodule mounted at
# .mise/ (loaded natively as .mise/config.toml) and the archetype include lives
# in a real root mise.toml like this one; here config.toml sits at the repo
# root, so the .mise/ entries are symlinks back to it (see .mise/) and only the
# include path differs (tasks/… instead of .mise/tasks/…).
[task_config]
includes = ["tasks/markdown-lib.toml"]
